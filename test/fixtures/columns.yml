# Acme project columns — covers agent + manual + terminal + every kind + system_key
acme_backlog:
  project: acme
  name: Backlog
  description: "Tasks waiting to be picked up."
  transition_policy: manual
  position: 1
  terminal: false
  system_key: backlog
  hidden_by_default: false
  config_version: 1
  adapter_config: {}
  budget_cents: 0
  max_concurrent_runs: 1
  resumable_session: false

acme_in_progress:
  project: acme
  name: In Progress
  description: "Active work in progress."
  transition_policy: agent
  position: 2
  terminal: false
  system_key: in_progress
  hidden_by_default: false
  config_version: 1
  adapter_type: claude_local
  adapter_config: { "model": "claude-sonnet-4-20250514" }
  job_spec: "Move tasks forward by completing the work described and calling advance_task when the success criteria are met."
  success_criteria: "Task implementation is complete, tests pass, and acceptance criteria are met."
  budget_cents: 5000
  max_concurrent_runs: 2
  resumable_session: true
  api_token: acme_in_progress_token_xxxxxxxxxx

